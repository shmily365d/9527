<!DOCTYPE html>

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        /* 顶部栏 */
        .header {
            background: rgba(26, 26, 46, 0.95);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            width: 120px;
            height: 45px;
            border-radius: 8px;
            object-fit: contain;
            background: #fff;
            padding: 5px;
            flex-shrink: 0;
        }
        .select-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
        }
        .product-select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            cursor: pointer;
        }
        .product-select option {
            background: #1a1a2e;
            color: #fff;
        }
        .history-btn {
            padding: 12px 18px;
            background: rgba(102,126,234,0.3);
            border: 1px solid rgba(102,126,234,0.5);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .history-btn:active {
            background: rgba(102,126,234,0.5);
            transform: scale(0.95);
        }
        
        /* 故障按钮网格 */
        .fault-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 20px;
        }
        .fault-btn {
            background: linear-gradient(135deg, rgba(102,126,234,0.2) 0%, rgba(118,75,162,0.2) 100%);
            border: 1px solid rgba(102,126,234,0.3);
            border-radius: 15px;
            padding: 20px 12px;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        .fault-btn:active {
            transform: scale(0.98);
            background: linear-gradient(135deg, rgba(102,126,234,0.3) 0%, rgba(118,75,162,0.3) 100%);
        }
        .fault-btn .icon {
            font-size: 32px;
            margin-bottom: 6px;
        }
        .fault-btn .text {
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            line-height: 1.3;
        }
        
        /* 消息区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-height: 50vh;
        }
        .message {
            margin-bottom: 20px;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-content {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            line-height: 1.6;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }
        .message-content strong {
            color: #667eea;
            font-weight: 600;
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .message-content ol, .message-content ul {
            margin: 10px 0;
            padding-left: 20px;
        }
        .message-content li {
            margin: 8px 0;
            line-height: 1.5;
        }
        .warning-box {
            background: rgba(255,193,7,0.2);
            border-left: 3px solid #ffc107;
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            font-size: 13px;
        }
        
        /* 历史记录弹窗 */
        .history-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .history-modal.show {

            align-items: center;
            justify-content: center;
        }
        .history-content {
            background: rgba(26,26,46,0.98);

            border-radius: 20px;
            padding: 25px;
            max-width: 400px;

        .history-header {

            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .history-header h2 {

            font-weight: 600;
        }
        .history-close {

            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 20px;

            align-items: center;

        }
        .history-close:active {

        }
        .history-list {

            position: relative;
            overflow: hidden;
        }

            transform: scale(0.95);
        }
        .voice-btn.listening {
            background: rgba(255,71,87,0.3);
            border-color: #ff4757;
        }
        .voice-btn.listening::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255,71,87,0.3);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0; }
        }
        .voice-tip {
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 8px;

            .header {

            }

            }
            .fault-btn .icon {
                font-size: 28px;
            }
            .fault-btn .text {
                font-size: 13px;
            }
        }

        // 初始化语音（使用 MediaRecorder API，兼容性更好）
        async function initVoice() {
            const voiceBtn = document.getElementById('voiceBtn');
            const voiceTip = document.getElementById('voiceTip');
            
            // 检查浏览器支持
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                voiceBtn.style.display = 'none';
                voiceTip.textContent = '您的浏览器不支持语音输入';
                return;
            }
            
            try {
                // 请求麦克风权限
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    } 
                });
                
                // 创建 MediaRecorder
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = function(event) {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                
                mediaRecorder.onstop = async function() {
                    const btn = document.getElementById('voiceBtn');
                    const tip = document.getElementById('voiceTip');
                    
                    btn.classList.remove('listening');
                    isRecording = false;
                    
                    // 录音时长小于 1 秒，视为误触
                    const duration = Date.now() - touchStartTime;
                    if (duration < 1000) {
                        tip.textContent = '🎤 录音时间太短，请重新录制';
                        setTimeout(() => {
                            tip.textContent = '🎤 长按说话，松开发送';
                        }, 2000);
                        audioChunks = [];
                        return;
                    }
                    
                    // 创建音频 Blob
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioChunks = [];
                    
                    tip.textContent = '🔄 正在识别语音...';
                    
                    // 发送到语音识别服务（这里使用百度语音识别 API）
                    // 注意：实际使用需要配置 API
                    try {
                        // 这里演示：直接提示用户手动输入
                        // 实际项目中应该调用语音识别 API
                        const text = await recognizeSpeech(audioBlob);
                        if (text) {
                            const input = document.getElementById('chatInput');
                            input.value = text;
                            sendMessage();
                        }
                    } catch(e) {
                        console.error('语音识别失败:', e);
                        tip.textContent = '❌ 识别失败，请手动输入';
                        setTimeout(() => {
                            tip.textContent = '🎤 长按说话，松开发送';
                        }, 3000);
                    }
                };
                
                console.log('✅ 语音功能初始化成功');
                
            } catch(e) {
                console.error('❌ 语音功能初始化失败:', e);
                voiceBtn.style.display = 'none';
                voiceTip.textContent = '❌ 无法使用语音（请检查麦克风权限）';

        // 语音识别（调用百度语音识别 API）
        async function recognizeSpeech(audioBlob) {
            // 注意：这里需要配置实际的语音识别 API
            // 以下是示例代码，实际使用需要替换为真实的 API 调用
            
            // 方案 1：使用百度语音识别（需要 API Key）
            // 方案 2：使用讯飞语音识别（需要 API Key）
            // 方案 3：使用浏览器自带的 SpeechRecognition（仅 Chrome/Edge）
            
            // 尝试使用浏览器自带的 SpeechRecognition
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                return new Promise((resolve, reject) => {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    const recognition = new SpeechRecognition();
                    recognition.lang = 'zh-CN';
                    recognition.continuous = false;
                    recognition.interimResults = false;
                    
                    recognition.onresult = (event) => {
                        resolve(event.results[0][0].transcript);
                    };
                    
                    recognition.onerror = (event) => {
                        reject(new Error(event.error));
                    };
                    
                    recognition.start();
                    
                    // 超时处理
                    setTimeout(() => {
                        recognition.stop();
                        reject(new Error('timeout'));
                    }, 10000);
                });
            }
            
            // 如果没有 SpeechRecognition，返回提示
            throw new Error('浏览器不支持语音识别');
        }
        
        // 切换语音输入（长按说话）
        function toggleVoice() {
            if (!mediaRecorder) {
                alert('语音功能正在初始化，请稍后重试');
                return;
            }
            
            const btn = document.getElementById('voiceBtn');
            const tip = document.getElementById('voiceTip');
            
            if (mediaRecorder.state === 'inactive') {
                // 开始录音
                audioChunks = [];
                touchStartTime = Date.now();
                mediaRecorder.start(1000); // 每秒发送一次数据
                btn.classList.add('listening');
                isRecording = true;
                tip.textContent = '🔴 正在录音，请说话...';
            } else if (mediaRecorder.state === 'recording') {
                // 停止录音
                mediaRecorder.stop();
            }
        }
        
        // 触摸事件处理（长按说话）
        function setupTouchEvents() {
            const voiceBtn = document.getElementById('voiceBtn');
            
            // 触摸开始
            voiceBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                if (!isRecording && mediaRecorder && mediaRecorder.state === 'inactive') {
                    audioChunks = [];
                    touchStartTime = Date.now();
                    mediaRecorder.start(1000);
                    this.classList.add('listening');
                    isRecording = true;
                    document.getElementById('voiceTip').textContent = '🔴 正在录音，请说话...';
                }
            }, { passive: false });
            
            // 触摸结束
            voiceBtn.addEventListener('touchend', function(e) {
                e.preventDefault();
                if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
            }, { passive: false });
            
            // 触摸取消
            voiceBtn.addEventListener('touchcancel', function(e) {
                e.preventDefault();
                if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
            }, { passive: false });
            
            // 鼠标事件（桌面端）
            voiceBtn.addEventListener('mousedown', function(e) {
                if (!isRecording && mediaRecorder && mediaRecorder.state === 'inactive') {
                    audioChunks = [];
                    touchStartTime = Date.now();
                    mediaRecorder.start(1000);
                    this.classList.add('listening');
                    isRecording = true;
                    document.getElementById('voiceTip').textContent = '🔴 正在录音，请说话...';
                }
            });
            
            voiceBtn.addEventListener('mouseup', function(e) {
                if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
            });
            
            voiceBtn.addEventListener('mouseleave', function(e) {
                if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
            });
        }
        
        // 渲染故障按钮
        function renderFaultButtons() {
            const grid = document.getElementById('faultGrid');
            const faults = faultConfig[currentProduct] || faultConfig['润'];
            
            grid.innerHTML = '';
            faults.forEach(fault => {
                const btn = document.createElement('div');
                btn.className = 'fault-btn';
                btn.innerHTML = `
                    <div class="icon">${fault.icon}</div>
                    <div class="text">${fault.text}</div>
                `;
                btn.onclick = () => searchFault(fault.text);
                grid.appendChild(btn);
            });
        }
        
        // 切换产品
        function changeProduct() {
            const select = document.getElementById('productSelect');
            currentProduct = select.value;
            renderFaultButtons();
            
            // 清空消息区
            document.getElementById('chatContainer').innerHTML = '';
        }
        
        // 搜索故障
        function searchFault(keyword) {
            const input = document.getElementById('chatInput');
            input.value = keyword;
            addToHistory(keyword);
            sendMessage();
        }
        
        // 添加到历史记录
        function addToHistory(keyword) {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', { 
                month: '2-digit', 
                day: '2-digit', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            
            // 移除重复项
            searchHistory = searchHistory.filter(item => item.keyword !== keyword);
            
            // 添加到开头
            searchHistory.unshift({
                keyword: keyword,
                time: timeStr,
                timestamp: now.getTime()
            });
            
            // 限制最多 20 条
            if (searchHistory.length > 20) {
                searchHistory = searchHistory.slice(0, 20);
            }
            
            localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
        }
        
        // 显示历史记录
        function toggleHistory() {
            const modal = document.getElementById('historyModal');
            const list = document.getElementById('historyList');
            
            if (modal.classList.contains('show')) {
                modal.classList.remove('show');
            } else {
                if (searchHistory.length === 0) {
                    list.innerHTML = `
                        <div class="history-empty">
                            <div class="icon">🕐</div>
                            <div>暂无查询历史</div>
                        </div>
                    `;
                } else {
                    list.innerHTML = searchHistory.map((item, index) => `
                        <li class="history-item" onclick="searchFault('${item.keyword}')">
                            <span style="flex:1;font-weight:500;">${item.keyword}</span>
                            <span class="time">${item.time}</span>
                        </li>
                    `).join('');
                }
                modal.classList.add('show');
            }
        }
        
        // 关闭历史弹窗
        function closeHistory(event) {
            if (event.target.id === 'historyModal') {
                document.getElementById('historyModal').classList.remove('show');
            }
        }
        
        // 清空历史
        function clearHistory() {
            if (confirm('确定要清空所有查询历史吗？')) {
                searchHistory = [];
                localStorage.setItem('searchHistory', JSON.stringify([]));
                toggleHistory();
            }
        }
        
        // 发送消息
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const query = input.value.trim();
            if (!query) return;
            
            addToHistory(query);
            
            const container = document.getElementById('chatContainer');
            const results = searchKnowledge(query);
            
            // 显示结果
            container.innerHTML = '';
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            messageDiv.innerHTML = `<div class="message-content">${results}</div>`;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
            
            input.value = '';
        }
        
        // 搜索知识库
        function searchKnowledge(query) {
            query = query.toLowerCase();
            let results = [];
            
            for (const item of knowledgeBase) {
                // 产品筛选
                const productMatch = item['产品'] === currentProduct || 
                                    item['产品'] === '通用' ||
                                    (item['产品别名'] && item['产品别名'].some(alias => alias === currentProduct));
                
                if (!productMatch) continue;
                
                // 搜索匹配
                const symptom = item['故障现象'].toLowerCase();
                const category = item['故障分类'].toLowerCase();
                const keywords = item['关键词'] || [];
                
                if (symptom.includes(query) || category.includes(query) || 
                    keywords.some(k => k.toLowerCase().includes(query))) {
                    results.push(item);
                }
            }
            
            if (results.length > 0) {
                return formatResult(results[0]);
            } else {
                return `
                    <div style="text-align:center;padding:20px;">
                        <div style="font-size:40px;margin-bottom:10px;">🔍</div>
                        <div>未找到匹配的故障</div>
                        <div style="color:rgba(255,255,255,0.5);font-size:13px;margin-top:10px;">
                            请尝试其他关键词或拨打客服热线：400-608-0917
                        </div>
                    </div>
                `;
            }
        }
        
        // 格式化结果
        function formatResult(item) {
            let html = `<strong>📋 ${item['故障现象']}</strong>`;
            
            html += `<div style="margin:15px 0;">`;
            html += `<div style="color:#667eea;font-weight:600;margin-bottom:8px;">🔍 可能原因：</div>`;
            html += `<ol style="margin:0;padding-left:20px;">`;
            item['可能原因'].forEach((cause, i) => {
                html += `<li style="margin:8px 0;">${cause}</li>`;
            });
            html += `</ol>`;
            html += `</div>`;
            
            html += `<div style="margin:15px 0;">`;
            html += `<div style="color:#667eea;font-weight:600;margin-bottom:8px;">🔧 排查步骤：</div>`;
            html += `<ol style="margin:0;padding-left:20px;">`;
            item['排查步骤'].forEach((step, i) => {
                html += `<li style="margin:8px 0;">${step}</li>`;
            });
            html += `</ol>`;
            html += `</div>`;
            
            if (item['需要备件'] && item['需要备件'].length > 0) {
                html += `<div style="margin:15px 0;">`;
                html += `<div style="color:#667eea;font-weight:600;margin-bottom:8px;">📦 需要备件：</div>`;
                html += `<div style="color:rgba(255,255,255,0.8);">${item['需要备件'].join('、')}</div>`;
                html += `</div>`;
            }
            
            if (item['维修难度'] || item['预计时间']) {
                html += `<div style="display:flex;gap:15px;margin-top:15px;flex-wrap:wrap;">`;
                if (item['维修难度']) {
                    html += `<div style="background:rgba(102,126,234,0.2);padding:8px 12px;border-radius:8px;font-size:13px;">`;
                    html += `<span style="color:#667eea;">难度：</span>${item['维修难度']}`;
                    html += `</div>`;
                }
                if (item['预计时间']) {
                    html += `<div style="background:rgba(102,126,234,0.2);padding:8px 12px;border-radius:8px;font-size:13px;">`;
                    html += `<span style="color:#667eea;">时间：</span>${item['预计时间']}`;
                    html += `</div>`;
                }
                html += `</div>`;
            }
            
            if (item['备注']) {
                html += `<div class="warning-box">💡 ${item['备注']}</div>`;
            }
            
            return html;
        }
        
        // 回车发送
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // 初始化
        initVoice().then(() => {
            setupTouchEvents();
        });
        renderFaultButtons();
    </script>
</body>
</html>
