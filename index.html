<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器人维修助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .chat-header h1 { font-size: 20px; font-weight: 600; margin-bottom: 5px; }
        .chat-header p { font-size: 13px; opacity: 0.9; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { flex-direction: row-reverse; }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .bot-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-right: 12px;
        }
        .user-avatar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin-left: 12px;
        }
        .message-content {
            max-width: 85%;
            padding: 15px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 14px;
        }
        .bot-message .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .user-message .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .message-content strong { font-weight: 600; color: #667eea; }
        .user-message .message-content strong { color: white; }
        .message-content ol, .message-content ul { margin: 10px 0; padding-left: 20px; }
        .message-content li { margin: 5px 0; }
        .category-tag {
            display: inline-block;
            background: #e7f3ff;
            color: #0066cc;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 12px;
        }
        .chat-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .chat-input:focus { border-color: #667eea; }
        .send-button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .send-button:disabled { opacity: 0.6; cursor: not-allowed; }
        .quick-questions {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #e9ecef;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .quick-question {
            padding: 8px 16px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 20px;
            font-size: 13px;
            color: #667eea;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-question:hover { background: #667eea; color: white; }
        @media (max-width: 480px) {
            body { padding: 0; }
            .chat-container { height: 100vh; border-radius: 0; }
            .message-content { max-width: 85%; }
            .quick-questions { overflow-x: auto; flex-wrap: nowrap; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 机器人维修助手</h1>
            <p>为现场工程师提供故障诊断指导</p>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                <div class="avatar bot-avatar">🤖</div>
                <div class="message-content">
                    <strong>你好！我是机器人维修助手</strong><br><br>
                    我可以帮你诊断：<br>
                    • 屏幕故障（黑屏、蓝屏、触摸异常）<br>
                    • 离线/网络问题<br>
                    • 声音故障（无声音、杂音）<br>
                    • 充电故障（充电慢、掉电快）<br>
                    • 舱门问题（卡阻、异响）<br>
                    • 激光/IMU 故障<br>
                    • 电梯/楼层问题<br>
                    • 轮子/行走异常<br>
                    <br>
                    请描述故障现象，我会帮你分析原因和解决方案！
                </div>
            </div>
        </div>
        <div class="quick-questions">
            <div class="quick-question" onclick="sendQuick('屏幕黑屏')">屏幕黑屏</div>
            <div class="quick-question" onclick="sendQuick('机器人离线')">机器人离线</div>
            <div class="quick-question" onclick="sendQuick('充电慢')">充电慢</div>
            <div class="quick-question" onclick="sendQuick('舱门卡住')">舱门卡住</div>
            <div class="quick-question" onclick="sendQuick('获取不到楼层')">获取不到楼层</div>
        </div>
        <div class="chat-input-container">
            <input type="text" class="chat-input" id="chatInput" placeholder="描述故障现象，如：屏幕黑屏、充电慢..." onkeypress="handleKeyPress(event)">
            <button class="send-button" id="sendButton" onclick="sendMessage()">发送</button>
        </div>
    </div>
    <script src="knowledge-base.js"></script>
    <script src="app.js"></script>
</body>
</html>
